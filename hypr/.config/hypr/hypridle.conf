general {
  lock_cmd = pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch dpms on && dark-side-of-the-monitor on
}
listener {
  timeout = 300
  on-timeout = hyprctl dispatch dpms off && dark-side-of-the-monitor off
  on-resume = hyprctl dispatch dpms on && dark-side-of-the-monitor on
}
listener {
  timeout = 14400
  on-timeout = loginctl lock-session
}
